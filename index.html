<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3D 대전 게임</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 50px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
        }
        .hp-bar { width: 200px; height: 20px; background: red; border: 2px solid white; }
        .hp-fill { width: 100%; height: 100%; background: lime; transition: width 0.1s; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <div>Player HP: <div class="hp-bar"><div id="player-hp" class="hp-fill"></div></div></div>
        <div>Enemy HP: <div class="hp-bar"><div id="enemy-hp" class="hp-fill"></div></div></div>
    </div>

    <script>
        // --- 게임 기본 설정 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x202030);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 조명 ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        // --- 바닥 ---
        const floorGeo = new THREE.PlaneGeometry(30, 30);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // --- 캐릭터 생성 ---
        // 플레이어 (파란색)
        const playerGeo = new THREE.BoxGeometry(2, 2, 2);
        const playerMat = new THREE.MeshStandardMaterial({ color: 0x00a8ff });
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.position.set(-5, 1, 0);
        scene.add(player);

        // 적 (빨간색)
        const enemyGeo = new THREE.BoxGeometry(2, 2, 2);
        const enemyMat = new THREE.MeshStandardMaterial({ color: 0xff4757 });
        const enemy = new THREE.Mesh(enemyGeo, enemyMat);
        enemy.position.set(5, 1, 0);
        scene.add(enemy);

        // --- 상태 변수 ---
        let playerHp = 100;
        let enemyHp = 100;
        const speed = 0.15;
        const keys = {};

        // 키보드 입력 감지
        window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        // 충돌 체크 함수 (간단한 거리 계산)
        function checkCollision(obj1, obj2) {
            const dist = obj1.position.distanceTo(obj2.position);
            return dist < 2.0; // 두 박스의 크기를 고려한 거리
        }

        // --- 메인 게임 루프 ---
        function animate() {
            requestAnimationFrame(animate);

            if (playerHp <= 0 || enemyHp <= 0) return;

            // 플레이어 조작 (WASD)
            if (keys['w']) player.position.z -= speed;
            if (keys['s']) player.position.z += speed;
            if (keys['a']) player.position.x -= speed;
            if (keys['d']) player.position.x += speed;

            // 간단한 적 AI (플레이어를 향해 다가옴)
            const dir = new THREE.Vector3().subVectors(player.position, enemy.position).normalize();
            enemy.position.x += dir.x * (speed * 0.4);
            enemy.position.z += dir.z * (speed * 0.4);

            // 공격 및 충돌 로직 (스페이스바를 누른 채 충돌하면 적 데미지, 그냥 부딪히면 플레이어 데미지)
            if (checkCollision(player, enemy)) {
                if (keys[' ']) { // Spacebar 공격
                    enemyHp -= 1;
                    document.getElementById('enemy-hp').style.width = enemyHp + '%';
                    // 적을 뒤로 밀쳐냄 (넉백)
                    enemy.position.addScaledVector(dir, -1.5);
                } else {
                    playerHp -= 0.5;
                    document.getElementById('player-hp').style.width = playerHp + '%';
                }
            }

            // 게임 오버 조건
            if (playerHp <= 0) {
                alert('패배했습니다! 페이지를 새로고침하세요.');
            } else if (enemyHp <= 0) {
                alert('승리했습니다! 페이지를 새로고침하세요.');
            }

            renderer.render(scene, camera);
        }

        // 창 크기 조절 대응
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
