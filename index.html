<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3D Arena Fighter - Final</title>
    <style>
        body, html { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #000; color: white; font-family: sans-serif; }
        .screen { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .hidden { display: none; }
        .panel { background: rgba(20,20,40,0.9); padding: 30px; border: 2px solid #00ffcc; border-radius: 10px; text-align: center; }
        .btn { padding: 10px 30px; background: #00ffcc; border: none; cursor: pointer; font-weight: bold; margin: 5px; }
        .matrix-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px; }
        .char-card { border: 1px solid #555; padding: 15px; cursor: pointer; }
        .char-card.active { border-color: #00ffcc; background: rgba(0,255,204,0.1); }
        #game-hud { pointer-events: none; padding: 20px; align-items: flex-start; justify-content: space-between; flex-direction: row; }
        .bar-bg { width: 200px; height: 15px; background: #333; margin: 5px 0; }
        .hp-bar { height: 100%; background: #ff3366; width: 100%; }
        .mp-bar { height: 100%; background: #00ccff; width: 100%; }
        #sub-view { position: absolute; bottom: 20px; right: 20px; width: 180px; height: 130px; border: 1px solid #00ffcc; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="start-screen" class="screen">
        <h1>ARENA MATRIX</h1>
        <button class="btn" onclick="changeScene('lobby')">START</button>
    </div>
    <div id="lobby-screen" class="screen hidden">
        <div class="panel">
            <h2>LOBBY</h2>
            <p>셋업: <span id="lobby-current-summary">-</span></p>
            <button class="btn" onclick="changeScene('char-select')">세팅 변경</button>
            <button class="btn" onclick="startMatchmaking('AI_PRACTICE')">전투 진입</button>
        </div>
    </div>
    <div id="char-select-screen" class="screen hidden">
        <div class="panel">
            <h3>SELECT AGENT</h3>
            <div class="matrix-grid">
                <div id="sel-avenger" class="char-card active" onclick="processSelectChar('avenger')">어벤저</div>
                <div id="sel-slayer" class="char-card" onclick="processSelectChar('slayer')">슬레이어</div>
                <div id="sel-guardian" class="char-card" onclick="processSelectChar('guardian')">가디언</div>
            </div>
            <button class="btn" onclick="confirmSelection()">완료</button>
        </div>
    </div>
    <div id="game-hud" class="screen hidden">
        <div>
            <h4 id="hud-p1-label">PLAYER</h4>
            <div class="bar-bg"><div id="p1-hp" class="hp-bar"></div></div>
            <div class="bar-bg"><div id="p1-mp" class="mp-bar"></div></div>
            <div>Roll: <span id="hud-roll-counter">0</span>/2</div>
        </div>
        <div style="text-align: right;">
            <h4 id="hud-p2-label">ENEMY</h4>
            <div class="bar-bg"><div id="p2-hp" class="hp-bar"></div></div>
            <div id="hud-weapon-desc"></div>
        </div>
        <div id="sub-view"></div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
