<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 락온 배틀 아레나 - 그랩 리뉴얼</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050515; font-family: sans-serif; }
        
        #ui {
            position: absolute; top: 10px; left: 10px; color: white;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px;
            pointer-events: none; z-index: 10;
        }
        h3 { margin: 0 0 10px 0; color: #00ffcc; }
        .controls { font-size: 13px; line-height: 1.5; }

        #status-container {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 40px; background: rgba(0,0,0,0.6);
            padding: 10px 25px; border-radius: 30px; border: 1px solid #444;
            z-index: 10; pointer-events: none; width: 500px; justify-content: space-between;
        }
        .status-box { display: flex; flex-direction: column; width: 220px; }
        .status-box.right { align-items: flex-end; }
        .label { color: #aaa; font-size: 12px; margin-bottom: 3px; font-weight: bold; }
        .bar-bg { width: 100%; height: 12px; background: #333; border-radius: 6px; overflow: hidden; margin-bottom: 4px; }
        .bar-fill { height: 100%; width: 100%; background: #ff3366; }
        .mp-fill { background: #3399ff; }

        #sub-view {
            position: absolute; bottom: 20px; left: 20px;
            width: 250px; height: 180px;
            border: 2px solid #00ffcc; border-radius: 6px;
            box-shadow: 0 0 15px rgba(0,255,204,0.5);
            pointer-events: none; z-index: 5;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="status-container">
        <div class="status-box">
            <div class="label" style="color: #00ff88;">PLAYER (나)</div>
            <div class="bar-bg"><div id="p1-hp" class="bar-fill"></div></div>
            <div class="bar-bg" style="height: 8px;"><div id="p1-mp" class="bar-fill mp-fill"></div></div>
        </div>
        <div class="status-box right">
            <div class="label" style="color: #ff3366;">ENEMY (적 - 고정됨)</div>
            <div class="bar-bg"><div id="p2-hp" class="bar-fill"></div></div>
            <div class="bar-bg" style="height: 8px;"><div id="p2-mp" class="bar-fill mp-fill"></div></div>
        </div>
    </div>

    <div id="ui">
        <h3>락온 배틀 (적 고정 & 완벽 그랩)</h3>
        <div class="controls">
            <b>[방향키]</b> 적 기준 이동 (↑돌진, ↓후진, ←→사이드스텝)<br>
            <b>[스킬 단축키 - WASD]</b><br>
            - <span style="color: #ff9900;"><b>W (그랩):</b></span> MP 20 / <B>적을 내 코앞까지 끝까지 끌어옴</B><br>
            - <span style="color: #ff3333;"><b>A (단검):</b></span> MP 15 / 고속 칼 투척<br>
            - <span style="color: #33ccff;"><b>S (베기):</b></span> MP 30 / 대형 검기 분출<br>
            - <span style="color: #cc33ff;"><b>D (충격파):</b></span> MP 25 / 주변 광역 폭발<br>
        </div>
    </div>

    <div id="sub-view"></div>

    <script>
        // --- 1. Three.js 기본 세팅 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050515);

        const mainCamera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const subCamera = new THREE.PerspectiveCamera(60, 250 / 180, 0.1, 1000);
        subCamera.position.set(0, 35, 0);
        subCamera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const subRenderer = new THREE.WebGLRenderer({ antialias: true });
        subRenderer.setSize(250, 180);
        document.getElementById('sub-view').appendChild(subRenderer.domElement);

        // 조명
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(10, 30, 10);
        scene.add(dirLight);

        // 바닥 격자
        const grid = new THREE.GridHelper(60, 60, 0x00ffcc, 0x222222);
        grid.position.y = -0.5;
        scene.add(grid);

        // --- 2. 게임 데이터 설정 ---
        const p1Stats = { hp: 100, maxHp: 100, mp: 100, maxMp: 100 };
        const p2Stats = { hp: 100, maxHp: 100, mp: 100, maxMp: 100 };

        const SKILL_DATA = {
            grab:      { mpCost: 20, damage: 10 },
            dagger:    { mpCost: 15, damage: 15 },
            slash:     { mpCost: 30, damage: 25 },
            shockwave: { mpCost: 25, damage: 20 }
        };

        function updateUI() {
            document.getElementById('p1-hp').style.width = `${Math.max(0, p1Stats.hp)}%`;
            document.getElementById('p1-mp').style.width = `${Math.max(0, p1Stats.mp)}%`;
            document.getElementById('p2-hp').style.width = `${Math.max(0, p2Stats.hp)}%`;
            document.getElementById('p2-mp').style.width = `${Math.max(0, p2Stats.mp)}%`;
        }

        // --- 3. 캐릭터 생성 ---
        const player1 = new THREE.Mesh(
            new THREE.SphereGeometry(0.8, 32, 32),
            new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x003311 })
        );
        player1.position.set(-10, 0.5, 0);
        scene.add(player1);

        // 상대 캐릭터 (위치 고정됨)
        const player2 = new THREE.Mesh(
            new THREE.BoxGeometry(2.0, 2.0, 2.0),
            new THREE.MeshStandardMaterial({ color: 0xff3366, roughness: 0.2 })
        );
        player2.position.set(10, 1.0, 0); // 맵 중앙 우측에 고정
        scene.add(player2);

        // 조준 가이드라인 선
        const lineMat = new THREE.LineBasicMaterial({ color: 0x555555 });
        const lineGeo = new THREE.BufferGeometry().setFromPoints([player1.position, player2.position]);
        const guideLine = new THREE.Line(lineGeo, lineMat);
        scene.add(guideLine);

        // --- 4. 조작 입력 제어 ---
        const keys = {};
        const projectiles = []; 
        const playerSpeed = 0.22; 
        let isGrabbed = false; // 그랩 유무 플래그

        window.focus();
        window.addEventListener('click', () => { window.focus(); });

        window.addEventListener('keydown', (e) => {
            if(['arrowup','arrowdown','arrowleft','arrowright'].includes(e.key.toLowerCase()) || ['keyw','keya','keys','keyd'].includes(e.code.toLowerCase())) {
                e.preventDefault(); 
            }

            keys[e.key] = true; 
            keys[e.code] = true; 

            if (e.code === 'KeyW') useSkill('grab');
            if (e.code === 'KeyA') useSkill('dagger');
            if (e.code === 'KeyS') useSkill('slash');
            if (e.code === 'KeyD') useSkill('shockwave');
        });
        
        window.addEventListener('keyup', (e) => { 
            keys[e.key] = false;
            keys[e.code] = false;
        });

        // --- 5. 스킬 발사 처리 ---
        function useSkill(type) {
            // 그랩 당하는 중에는 중복 발사 불가
            if (isGrabbed && type === 'grab') return;

            const data = SKILL_DATA[type];
            if (p1Stats.mp < data.mpCost) return; 

            p1Stats.mp -= data.mpCost;
            updateUI();

            const toEnemy = new THREE.Vector3().subVectors(player2.position, player1.position).normalize();
            const spawnPos = new THREE.Vector3().copy(player1.position).addScaledVector(toEnemy, 2.0);
            spawnPos.y = 1.0; 

            if (type === 'grab') {
                const grabGeo = new THREE.CylinderGeometry(0.35, 0.35, 7, 16);
                grabGeo.rotateX(Math.PI / 2); 
                const grabMesh = new THREE.Mesh(grabGeo, new THREE.MeshBasicMaterial({ color: 0xff9900 }));
                grabMesh.position.copy(spawnPos);
                scene.add(grabMesh);
                projectiles.push({ type: 'grab', mesh: grabMesh, dir: toEnemy, speed: 0.6, life: 60, damage: data.damage });

            } else if (type === 'dagger') {
                const daggerGeo = new THREE.ConeGeometry(0.6, 3.0, 16);
                daggerGeo.rotateX(Math.PI / 2);
                const daggerMesh = new THREE.Mesh(daggerGeo, new THREE.MeshBasicMaterial({ color: 0xff1111 }));
                daggerMesh.position.copy(spawnPos);
                scene.add(daggerMesh);
                projectiles.push({ type: 'dagger', mesh: daggerMesh, dir: toEnemy, speed: 0.75, life: 60, damage: data.damage });

            } else if (type === 'slash') {
                const slashGeo = new THREE.RingGeometry(1.5, 6.0, 32, 1, 0, Math.PI); 
                slashGeo.rotateX(-Math.PI / 3.5); 
                const slashMesh = new THREE.Mesh(slashGeo, new THREE.MeshBasicMaterial({ color: 0x00d2ff, side: THREE.DoubleSide }));
                slashMesh.position.copy(spawnPos);
                slashMesh.lookAt(player2.position); 
                scene.add(slashMesh);
                projectiles.push({ type: 'slash', mesh: slashMesh, dir: toEnemy, speed: 0.38, life: 60, damage: data.damage });

            } else if (type === 'shockwave') {
                const waveGeo = new THREE.RingGeometry(0.5, 2.0, 32);
                waveGeo.rotateX(-Math.PI / 2);
                const waveMesh = new THREE.Mesh(waveGeo, new THREE.MeshBasicMaterial({ color: 0xcc33ff, side: THREE.DoubleSide, transparent: true, opacity: 0.9 }));
                waveMesh.position.copy(player1.position);
                waveMesh.position.y = 0.2; 
                scene.add(waveMesh);
                projectiles.push({ type: 'shockwave', mesh: waveMesh, radius: 2.0, life: 35, damage: data.damage });
            }
        }

        function hitEnemy(amount) {
            p2Stats.hp -= amount;
            if (p2Stats.hp < 0) p2Stats.hp = 0;
            updateUI();

            player2.scale.set(1.6, 1.6, 1.6);
            player2.material.color.setHex(0xffffff);
            setTimeout(() => {
                player2.scale.set(1.0, 1.0, 1.0);
                player2.material.color.setHex(0xff3366);
            }, 150);

            if (p2Stats.hp <= 0) {
                setTimeout(() => { p2Stats.hp = 100; updateUI(); }, 1500);
            }
        }

        // --- 6. 메인 업데이트 루프 ---
        let lastRegenTime = 0;

        function animate(timestamp) {
            requestAnimationFrame(animate);

            // 마나 자동 회복
            if (timestamp - lastRegenTime > 200) {
                if (p1Stats.mp < p1Stats.maxMp) p1Stats.mp = Math.min(p1Stats.maxMp, p1Stats.mp + 1.5);
                if (p2Stats.mp < p2Stats.maxMp) p2Stats.mp = Math.min(p2Stats.maxMp, p2Stats.mp + 1);
                updateUI();
                lastRegenTime = timestamp;
            }

            // 적 기준 방향 벡터 연산
            const forwardVec = new THREE.Vector3().subVectors(player2.position, player1.position);
            const distanceToEnemy = forwardVec.length();
            forwardVec.normalize();
            const rightVec = new THREE.Vector3().crossVectors(forwardVec, new THREE.Vector3(0, 1, 0)).normalize();

            // 방향키 조작 반응 (그랩으로 적을 끌어당길 때는 플레이어 이동을 일시 잠금하여 정확도 향상)
            if (!isGrabbed) {
                if (keys['ArrowUp'] && distanceToEnemy > 2.2) player1.position.addScaledVector(forwardVec, playerSpeed);
                if (keys['ArrowDown']) player1.position.addScaledVector(forwardVec, -playerSpeed);
                if (keys['ArrowLeft']) player1.position.addScaledVector(rightVec, playerSpeed);
                if (keys['ArrowRight']) player1.position.addScaledVector(rightVec, -playerSpeed);
            }

            // [리뉴얼 핵심] 그랩 피격 시 완전히 내 쪽으로 끌고 오는 LERP 연산
            if (isGrabbed) {
                // 내 전방 코앞(1.8유닛 거리)을 타겟 포인트로 지정
                const targetPos = new THREE.Vector3().copy(player1.position).addScaledVector(forwardVec, 1.8);
                targetPos.y = 1.0; // 높이 보정
                
                // 적의 위치를 내 코앞으로 강하게 끌어당김 (속도 0.25)
                player2.position.lerp(targetPos, 0.25);
                
                // 도착 완료 검사
                if (player2.position.distanceTo(targetPos) < 0.2) {
                    isGrabbed = false; // 그랩 판정 해제
                }
            }

            // 가이드라인 조준선 연동
            const positions = guideLine.geometry.attributes.position.array;
            positions[0] = player1.position.x; positions[1] = player1.position.y + 0.5; positions[2] = player1.position.z;
            positions[3] = player2.position.x; positions[4] = player2.position.y; positions[5] = player2.position.z;
            guideLine.geometry.attributes.position.needsUpdate = true;

            // 시점 락온 고정
            mainCamera.position.copy(player1.position);
            mainCamera.position.y += 1.3; 
            mainCamera.lookAt(player2.position);

            subCamera.position.set(0, 35, 0);
            subCamera.lookAt(0, 0, 0);

            // 투사체 이동 및 처리
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.life--;

                if (p.type === 'shockwave') {
                    p.radius += 0.45;
                    p.mesh.geometry.dispose(); 
                    p.mesh.geometry = new THREE.RingGeometry(p.radius - 0.6, p.radius, 32);
                    p.mesh.geometry.rotateX(-Math.PI / 2);
                    p.mesh.material.opacity -= 0.035;

                    const dist = player1.position.distanceTo(player2.position);
                    if (dist <= p.radius && dist >= p.radius - 2.5) {
                        hitEnemy(p.damage);
                        // 충격파는 고정된 상태이므로 밀쳐내지 않고 순수 대미지만 가함
                    }
                } else {
                    // 적이 고정되어 있으므로 투사체가 적을 향해 정확하게 비행
                    const currentDir = new THREE.Vector3().subVectors(player2.position, p.mesh.position).normalize();
                    p.mesh.position.addScaledVector(currentDir, p.speed);
                    p.mesh.lookAt(player2.position); 

                    const distance = p.mesh.position.distanceTo(player2.position);
                    if (distance < 2.2) {
                        hitEnemy(p.damage);
                        if (p.type === 'grab') {
                            isGrabbed = true; // 그랩 견인 활성화
                        }
                        scene.remove(p.mesh);
                        projectiles.splice(i, 1);
                        continue;
                    }
                }

                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    projectiles.splice(i, 1);
                }
            }

            player2.rotation.y += 0.01;

            renderer.render(scene, mainCamera);
            subRenderer.render(scene, subCamera);
        }

        window.addEventListener('resize', () => {
            mainCamera.aspect = window.innerWidth / window.innerHeight;
            mainCamera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        updateUI();
        animate(0);
    </script>
</body>
</html>
