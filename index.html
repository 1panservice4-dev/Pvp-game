<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D 락온 아레나 - 무기 리빌드 및 시점 초기화 패치</title>
    <style>
        html, body { 
            width: 100%; height: 100%; margin: 0; padding: 0; 
            overflow: hidden; background-color: #050515; 
            font-family: sans-serif; user-select: none; color: white; touch-action: none;
        }
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; z-index: 100; box-sizing: border-box;
        }
        .hidden { display: none !important; }

        #start-screen { justify-content: center; align-items: center; background: radial-gradient(circle, #1a1a3a 0%, #020208 100%); }
        .game-title { font-size: 48px; color: #00ffcc; text-shadow: 0 0 20px rgba(0,255,204,0.5); font-weight: 900; margin-bottom: 5px; }
        .game-subtitle { font-size: 14px; color: #778; margin-bottom: 30px; }
        
        #lobby-screen { background: linear-gradient(to bottom, rgba(15,23,42,0.4), rgba(2,6,23,0.95)); padding: 20px; justify-content: space-between; }
        .lobby-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .lobby-logo { font-size: 22px; font-weight: 900; color: #00ffcc; }
        .lobby-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        
        .btn-enter-select { 
            background: rgba(0,255,204,0.1); border: 2px solid #00ffcc; color: #00ffcc; 
            border-radius: 6px; width: 180px; height: 45px; font-weight: bold; cursor: pointer;
        }

        #char-select-screen { background: rgba(5,5,20,0.98); padding: 30px; justify-content: center; align-items: center; z-index: 150; }
        .select-container { width: 850px; display: flex; flex-direction: column; gap: 20px; }
        .selection-zone { display: flex; gap: 20px; }
        .select-box { flex: 1; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 15px; }
        .char-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .char-card {
            height: 80px; background: rgba(255,255,255,0.03); border: 2px solid rgba(255,255,255,0.1);
            border-radius: 6px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer;
        }
        .char-card.active { background: rgba(0,255,204,0.15); border-color: #00ffcc; }
        .weapon-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .weapon-slot { padding: 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;}
        .weapon-slot.active { background: rgba(0,255,204,0.2); border-color: #00ffcc; }
        .w-desc { font-size: 11px; color: #aaa; }
        .weapon-slot.active .w-desc { color: #00ffcc; }

        .battle-control-panel { position: relative; }
        .battle-menu { position: absolute; bottom: 65px; right: 0; width: 220px; background: #0b0f19; border: 1px solid #1e293b; border-radius: 8px; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .menu-btn { width: 100%; padding: 10px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; color: #ddd; text-align: left; cursor: pointer; }
        .ai-difficulty-selector { display: flex; gap: 3px; background: rgba(0,0,0,0.4); padding: 3px; border-radius: 4px; }
        .diff-tab { flex: 1; text-align: center; padding: 4px; font-size: 11px; color: #64748b; cursor: pointer; }
        .diff-tab.active { background: #3b82f6; color: #fff; border-radius: 3px; }

        .btn { padding: 10px 30px; font-weight: bold; color: #050515; background: #00ffcc; border: none; border-radius: 20px; cursor: pointer; }
        .btn-battle-trigger { width: 180px; height: 50px; font-size: 18px; background: #ff3366; color: white; border-radius: 8px; }
        .btn-complete { background: #00ffcc; color: #050515; width: 150px; align-self: flex-end; }

        #game-hud { pointer-events: none; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 6px; font-size: 12px; }
        .btn-exit-match { position: absolute; top: 10px; right: 10px; pointer-events: auto; padding: 8px 15px; font-size: 12px; background: rgba(255,51,102,0.2); border: 1px solid #ff3366; color: #ff3366; border-radius: 4px; cursor: pointer; }
        #status-container { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; background: rgba(0,0,0,0.6); padding: 8px 20px; border-radius: 20px; width: 400px; justify-content: space-between; }
        .status-box { display: flex; flex-direction: column; width: 180px; font-size: 11px; }
        .bar-bg { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-top: 2px; }
        .bar-fill { height: 100%; width: 100%; background: #ff3366; }
        .mp-fill { background: #3399ff; }
        #sub-view { position: absolute; bottom: 10px; left: 10px; width: 180px; height: 130px; border: 2px solid #00ffcc; border-radius: 4px; }

        canvas { display: block; width: 100% !important; height: 100% !important; position: absolute; top: 0; left: 0; z-index: 1; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="start-screen" class="screen">
        <div class="game-title">ARENA LOCK-ON</div>
        <div class="game-subtitle">FIXED ROTATION & WEAPON ARCHITECTURE</div>
        <button class="btn" onclick="changeScene('lobby')">START</button>
    </div>

    <div id="lobby-screen" class="screen hidden">
        <div class="lobby-header">
            <div class="lobby-logo">ARENA LOCK-ON</div>
            <div style="font-size:13px; color:#aaa;">세팅: <span style="color:#00ffcc;" id="lobby-current-summary">-</span></div>
        </div>
        <div class="lobby-footer">
            <button class="btn-enter-select" onclick="changeScene('char-select')">🛠️ 세팅 변경</button>
            <div class="battle-control-panel">
                <div id="battle-pop-menu" class="battle-menu hidden">
                    <button class="menu-btn" onclick="alert('⚔️ 매칭 중...')">일반 배틀매치</button>
                    <div class="ai-difficulty-selector">
                        <div class="diff-tab active" id="diff-easy" onclick="setAiDiff('easy')">쉬움</div>
                        <div class="diff-tab" id="diff-normal" onclick="setAiDiff('normal')">보통</div>
                        <div class="diff-tab" id="diff-hard" onclick="setAiDiff('hard')">어려움</div>
                    </div>
                </div>
                <button class="btn btn-battle-trigger" onclick="toggleBattleMenu()">전투 매칭</button>
            </div>
        </div>
    </div>

    <div id="char-select-screen" class="screen hidden">
        <div class="select-container">
            <div style="font-size: 22px; font-weight: bold; color: #00ffcc; border-bottom: 1px solid #00ffcc; padding-bottom: 5px;">EQUIPMENT MATRIX</div>
            <div class="selection-zone">
                <div class="select-box">
                    <div style="font-size: 14px; font-weight: bold;">1. 코어 에이전트</div>
                    <div class="char-grid">
                        <div class="char-card active" id="sel-avenger" onclick="processSelectChar('avenger')"><b>어벤저</b><span style="font-size:10px;color:#3399ff;">⚡ 0.2s (+2)</span></div>
                        <div class="char-card" id="sel-slayer" onclick="processSelectChar('slayer')"><b>슬레이어</b><span style="font-size:10px;color:#3399ff;">⚡ 0.15s (+3)</span></div>
                        <div class="char-card" id="sel-guardian" onclick="processSelectChar('guardian')"><b>가디언</b><span style="font-size:10px;color:#3399ff;">⚡ 0.3s (+1)</span></div>
                    </div>
                </div>
                <div class="select-box">
                    <div style="font-size: 14px; font-weight: bold;">2. 지정 무기 군</div>
                    <div class="weapon-list" id="select-screen-weapon-container"></div>
                </div>
            </div>
            <button class="btn btn-complete" onclick="confirmSelection()">완료</button>
        </div>
    </div>

    <div id="game-hud" class="screen hidden">
        <button class="btn-exit-match" onclick="changeScene('lobby')">퇴장</button>
        <div id="status-container">
            <div class="status-box">
                <div id="hud-p1-label" style="color:#00ff88;">PLAYER</div>
                <div class="bar-bg"><div id="p1-hp" class="bar-fill"></div></div>
                <div class="bar-bg" style="height:5px;"><div id="p1-mp" class="bar-fill mp-fill"></div></div>
            </div>
            <div class="status-box" style="align-items:flex-end;">
                <div id="hud-p2-label" style="color:#ff3366;">ENEMY</div>
                <div class="bar-bg"><div id="p2-hp" class="bar-fill"></div></div>
                <div class="bar-bg" style="height:5px;"><div id="p2-mp" class="bar-fill mp-fill"></div></div>
            </div>
        </div>
        <div id="ui">
            <h4 style="margin:0 0 5px 0; color:#00ffcc;">아레나 라이브 (스마트 트래킹)</h4>
            <b>[방향키]</b> 이동 / <b>[Shift]</b> 무빙 구르기 회피<br>
            <b>[스킬]</b> W, A, S, D 사용 가능<br>
            <span id="hud-weapon-desc" style="color:#00ffcc;">-</span>
        </div>
        <div id="sub-view"></div>
    </div>

    <script>
        // 무기 프리셋 리빌드 및 가중치 버프 설계
        const COMMON_WEAPON_POOL = [
            { id: "w_bare",   name: "맨손 (Unarmed)",    dmgMult: 1.0, mpMod: 1.0,  desc: "기본 능력치 유지", color: 0xaaaaaa },
            { id: "w_sword",  name: "검 (Sword)",       dmgMult: 1.4, mpMod: 1.0,  desc: "근접 스킬 데미지 증가 (x1.4)", color: 0xff3344 },
            { id: "w_stick",  name: "스틱 (Stick)",     dmgMult: 1.0, mpMod: 0.75, desc: "MP 소모량 감소 (25% 세이브)", color: 0x33ff66 },
            { id: "w_wand",   name: "완드 (Wand)",      dmgMult: 0.8, mpMod: 0.45, desc: "MP 소모량 대폭 감소 (55% 세이브)", color: 0x3399ff }
        ];

        const CHAR_DB = {
            avenger:  { name: "어벤저", hp: 100, mp: 100, spd: 0.22, color: 0x00ff88, regenInterval: 200, regenAmount: 2 },
            slayer:   { name: "슬레이어", hp: 85,  mp: 120, spd: 0.28, color: 0x00d2ff, regenInterval: 150, regenAmount: 3 },
            guardian: { name: "가디언", hp: 140, mp: 80,  spd: 0.16, color: 0xffaa00, regenInterval: 300, regenAmount: 1 }
        };

        let selectedChar = 'avenger'; let selectedWeaponIdx = 0; let aiDifficulty = 'easy'; let lastRegenTime = 0;

        function createHumanoidModel(baseColor) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: baseColor, roughness: 0.4 });
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.2, 0.5), mat); torso.position.y = 1.1; group.add(torso);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), mat); head.position.y = 1.9; group.add(head);
            const lArm = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.9, 0.25), mat); lArm.position.set(-0.65, 1.1, 0); group.add(lArm);
            const rArm = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.9, 0.25), mat); rArm.position.set(0.65, 1.1, 0); group.add(rArm);
            const lLeg = new THREE.Mesh(new THREE.BoxGeometry(0.28, 1.0, 0.28), mat); lLeg.position.set(-0.25, 0.5, 0); group.add(lLeg);
            const rLeg = new THREE.Mesh(new THREE.BoxGeometry(0.28, 1.0, 0.28), mat); rLeg.position.set(0.25, 0.5, 0); group.add(rLeg);
            group.userData = { torso, head, materials: [mat] };
            return group;
        }

        function updateModelColor(model, hexColor) {
            if(model?.userData?.materials) model.userData.materials.forEach(m => m.color.setHex(hexColor));
        }

        function processSelectChar(id) {
            selectedChar = id;
            document.querySelectorAll('.char-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`sel-${id}`).classList.add('active');
            updateModelColor(player1, CHAR_DB[id].color);
        }

        function renderCommonWeapons() {
            const container = document.getElementById('select-screen-weapon-container');
            container.innerHTML = "";
            COMMON_WEAPON_POOL.forEach((w, idx) => {
                const slot = document.createElement('div');
                slot.className = `weapon-slot ${idx === selectedWeaponIdx ? 'active' : ''}`;
                slot.onclick = () => { selectedWeaponIdx = idx; renderCommonWeapons(); };
                slot.innerHTML = `<span><b>${w.name}</b></span><span class="w-desc">${w.desc}</span>`;
                container.appendChild(slot);
            });
        }

        function confirmSelection() {
            document.getElementById('lobby-current-summary').innerText = `${CHAR_DB[selectedChar].name} + [${COMMON_WEAPON_POOL[selectedWeaponIdx].name}]`;
            changeScene('lobby');
        }

        function toggleBattleMenu() { document.getElementById('battle-pop-menu').classList.toggle('hidden'); }

        function setAiDiff(diff) {
            aiDifficulty = diff;
            document.querySelectorAll('.diff-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`diff-${diff}`).classList.add('active');
            setTimeout(() => { document.getElementById('battle-pop-menu').classList.add('hidden'); changeScene('game'); }, 100);
        }

        function changeScene(sceneName) {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('lobby-screen').classList.add('hidden');
            document.getElementById('char-select-screen').classList.add('hidden');
            document.getElementById('game-hud').classList.add('hidden');

            if (sceneName === 'start') document.getElementById('start-screen').classList.remove('hidden');
            else if (sceneName === 'lobby') document.getElementById('lobby-screen').classList.remove('hidden');
            else if (sceneName === 'char-select') { document.getElementById('char-select-screen').classList.remove('hidden'); renderCommonWeapons(); }
            else if (sceneName === 'game') {
                document.getElementById('game-hud').classList.remove('hidden');
                const cData = CHAR_DB[selectedChar]; const wData = COMMON_WEAPON_POOL[selectedWeaponIdx];
                p1Stats.maxHp = cData.hp; p1Stats.hp = cData.hp; p1Stats.maxMp = cData.mp; p1Stats.mp = cData.mp; defaultSpeed = cData.spd;
                document.getElementById('hud-weapon-desc').innerText = `특성: ${wData.desc}`;
                const lbl = document.getElementById('hud-p2-label');
                if(aiDifficulty === 'easy') { lbl.innerText = "ENEMY (쉬움)"; updateModelColor(player2, 0xffaa00); }
                else if(aiDifficulty === 'normal') { lbl.innerText = "ENEMY (보통)"; updateModelColor(player2, 0xff3366); }
                else { lbl.innerText = "ENEMY (시련)"; updateModelColor(player2, 0xaa00ff); }
                document.getElementById('hud-p1-label').innerText = `PLAYER (${selectedChar.toUpperCase()})`;
                
                // [해결] 씬 진입 시 플레이어 위치 설정 및 카메라 트랜스폼 오프셋 초기화 강제 집행
                player1.position.set(-10, 0, 0); 
                player2.position.set(10, 0, 0); 
                
                // 임시 각도 강제 제로화 및 행렬 갱신
                mainCamera.rotation.set(0, 0, 0);
                mainCamera.quaternion.set(0, 0, 0, 1);
                mainCamera.updateMatrixWorld(true);
                
                p2Stats.hp = 100; p2Stats.mp = 100;
                isGrabbed = false; isRolling = false; lastRegenTime = performance.now(); updateUI();
            }
        }

        // --- Three.js 핵심 구성 ---
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x050515);
        const mainCamera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const subCamera = new THREE.PerspectiveCamera(60, 180 / 130, 0.1, 1000);
        subCamera.position.set(0, 35, 0); subCamera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const subRenderer = new THREE.WebGLRenderer({ antialias: true });
        subRenderer.setSize(180, 130); document.getElementById('sub-view').appendChild(subRenderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2); dirLight.position.set(10, 30, 10); scene.add(dirLight);
        const grid = new THREE.GridHelper(60, 60, 0x00ffcc, 0x222222); scene.add(grid);

        const p1Stats = { hp: 100, maxHp: 100, mp: 100, maxMp: 100 };
        const p2Stats = { hp: 100, maxHp: 100, mp: 100, maxMp: 100 };
        
        // 베이스 스킬 스펙
        const SKILL_DATA = { 
            grab: { mpCost: 20, damage: 10 }, 
            dagger: { mpCost: 15, damage: 15 }, 
            slash: { mpCost: 30, damage: 25 }, 
            shockwave: { mpCost: 25, damage: 20 } 
        };

        function updateUI() {
            document.getElementById('p1-hp').style.width = `${(p1Stats.hp / p1Stats.maxHp) * 100}%`;
            document.getElementById('p1-mp').style.width = `${(p1Stats.mp / p1Stats.maxMp) * 100}%`;
            document.getElementById('p2-hp').style.width = `${p2Stats.hp}%`;
            document.getElementById('p2-mp').style.width = `${p2Stats.mp}%`;
        }

        const player1 = createHumanoidModel(0x00ff88); scene.add(player1);
        const player2 = createHumanoidModel(0xff3366); scene.add(player2);
        const p1Center = new THREE.Vector3(), p2Center = new THREE.Vector3();
        const guideLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints([player1.position, player2.position]), new THREE.LineBasicMaterial({ color: 0x334155 }));
        scene.add(guideLine);

        const keys = {}; const projectiles = []; let isGrabbed = false;
        let defaultSpeed = 0.22; let p1VelocityY = 0; const gravity = -0.015; const jumpForce = 0.35; let isGrounded = true;
        
        let isRolling = false; let rollFrames = 0; const rollDuration = 22; const rollSpeed = 0.52; 
        let rollDirection = new THREE.Vector3(); let rollType = 'forward'; 

        window.addEventListener('keydown', (e) => {
            if (document.getElementById('game-hud').classList.contains('hidden')) return;
            const codeStr = e.code.toLowerCase();
            if(['arrowup','arrowdown','arrowleft','arrowright','space'].includes(codeStr)) e.preventDefault();
            keys[e.key] = true; keys[e.code] = true;
            if (e.code === 'Space' && isGrounded && !isRolling) { p1VelocityY = jumpForce; isGrounded = false; }
            if ((e.code === 'ShiftLeft' || e.code === 'ShiftRight') && !isRolling) startRoll();
            if (e.code === 'KeyW') useSkill('grab'); if (e.code === 'KeyA') useSkill('dagger');
            if (e.code === 'KeyS') useSkill('slash'); if (e.code === 'KeyD') useSkill('shockwave');
        });
        window.addEventListener('keyup', (e) => { keys[e.key] = false; keys[e.code] = false; });

        function startRoll() {
            const moveForward = new THREE.Vector3().subVectors(player2.position, player1.position); moveForward.y = 0; moveForward.normalize();
            const moveRight = new THREE.Vector3().crossVectors(moveForward, new THREE.Vector3(0, 1, 0)).normalize();
            let targetDir = new THREE.Vector3();

            rollType = 'forward';
            if (keys['ArrowUp']) { targetDir.add(moveForward); rollType = 'forward'; }
            else if (keys['ArrowDown']) { targetDir.addScaledVector(moveForward, -1); rollType = 'backward'; }
            
            if (keys['ArrowLeft']) { targetDir.addScaledVector(moveRight, -1); if(!keys['ArrowUp'] && !keys['ArrowDown']) rollType = 'side'; }
            if (keys['ArrowRight']) { targetDir.add(moveRight); if(!keys['ArrowUp'] && !keys['ArrowDown']) rollType = 'side'; }

            if (targetDir.lengthSq() === 0) { targetDir.copy(moveForward); rollType = 'forward'; } 
            else targetDir.normalize();

            rollDirection.copy(targetDir); isRolling = true; rollFrames = 0;
        }

        function useSkill(type) {
            if (isGrabbed && type === 'grab') return;
            const baseData = SKILL_DATA[type];
            const wData = COMMON_WEAPON_POOL[selectedWeaponIdx]; 

            // 무기 특성 연산 대입 (MP소모 변경 및 데미지 배율 적용)
            const runtimeMpCost = Math.floor(baseData.mpCost * wData.mpMod);
            const runtimeDamage = Math.floor(baseData.damage * wData.dmgMult);

            if (p1Stats.mp < runtimeMpCost) return;
            p1Stats.mp -= runtimeMpCost; updateUI();

            p1Center.copy(player1.position).y += 1.1; p2Center.copy(player2.position).y += 1.1;
            const toEnemy = new THREE.Vector3().subVectors(p2Center, p1Center).normalize();
            const spawnPos = new THREE.Vector3().copy(p1Center).addScaledVector(toEnemy, 1.5);
            const pMat = new THREE.MeshBasicMaterial({ color: wData.color });

            if (type === 'grab') {
                const grabGeo = new THREE.CylinderGeometry(0.25, 0.25, 6, 16); grabGeo.rotateX(Math.PI / 2);
                const grabMesh = new THREE.Mesh(grabGeo, pMat); grabMesh.position.copy(spawnPos); scene.add(grabMesh);
                projectiles.push({ type: 'grab', mesh: grabMesh, dir: toEnemy, speed: 0.6, life: 60, damage: runtimeDamage });
            } else if (type === 'dagger') {
                const daggerGeo = new THREE.ConeGeometry(0.4, 2.2, 16); daggerGeo.rotateX(Math.PI / 2);
                const daggerMesh = new THREE.Mesh(daggerGeo, pMat); daggerMesh.position.copy(spawnPos); scene.add(daggerMesh);
                projectiles.push({ type: 'dagger', mesh: daggerMesh, dir: toEnemy, speed: 0.75, life: 60, damage: runtimeDamage });
            } else if (type === 'slash') {
                const slashGeo = new THREE.RingGeometry(1.2, 4.5, 32, 1, 0, Math.PI); slashGeo.rotateX(-Math.PI / 3.5);
                const slashMesh = new THREE.Mesh(slashGeo, new THREE.MeshBasicMaterial({ color: wData.color, side: THREE.DoubleSide })); slashMesh.position.copy(spawnPos); slashMesh.lookAt(p2Center); scene.add(slashMesh);
                projectiles.push({ type: 'slash', mesh: slashMesh, dir: toEnemy, speed: 0.38, life: 60, damage: runtimeDamage });
            } else if (type === 'shockwave') {
                const waveGeo = new THREE.RingGeometry(0.5, 2.0, 32); waveGeo.rotateX(-Math.PI / 2);
                const waveMesh = new THREE.Mesh(waveGeo, new THREE.MeshBasicMaterial({ color: wData.color, side: THREE.DoubleSide, transparent: true, opacity: 0.9 })); waveMesh.position.copy(player1.position); waveMesh.position.y = 0.05; scene.add(waveMesh);
                projectiles.push({ type: 'shockwave', mesh: waveMesh, radius: 2.0, life: 35, damage: runtimeDamage });
            }
        }

        function hitEnemy(amount) {
            p2Stats.hp -= amount; if (p2Stats.hp < 0) p2Stats.hp = 0; updateUI();
            player2.scale.set(1.4, 1.4, 1.4);
            setTimeout(() => { 
                player2.scale.set(1.0, 1.0, 1.0); 
                if(aiDifficulty === 'easy') updateModelColor(player2, 0xffaa00); 
                else if(aiDifficulty === 'normal') updateModelColor(player2, 0xff3366); 
                else updateModelColor(player2, 0xaa00ff); 
            }, 150);
        }

        function animate(timestamp) {
            requestAnimationFrame(animate);
            const isGameActive = !document.getElementById('game-hud').classList.contains('hidden');

            if (isGameActive) {
                const currentCharData = CHAR_DB[selectedChar];
                if (timestamp - lastRegenTime > currentCharData.regenInterval) {
                    if (p1Stats.mp < p1Stats.maxMp) p1Stats.mp = Math.min(p1Stats.maxMp, p1Stats.mp + currentCharData.regenAmount);
                    if (p2Stats.mp < p2Stats.maxMp) p2Stats.mp = Math.min(p2Stats.maxMp, p2Stats.mp + 2);
                    updateUI(); lastRegenTime = timestamp;
                }

                p1Center.copy(player1.position).y += 1.9; p2Center.copy(player2.position).y += 1.1;
                const moveForward = new THREE.Vector3().subVectors(player2.position, player1.position); moveForward.y = 0;
                const distanceToEnemy = moveForward.length(); moveForward.normalize();
                const moveRight = new THREE.Vector3().crossVectors(moveForward, new THREE.Vector3(0, 1, 0)).normalize();

                if (!isRolling && !isGrabbed) {
                    if (keys['ArrowUp'] && distanceToEnemy > 2.2) player1.position.addScaledVector(moveForward, defaultSpeed);
                    if (keys['ArrowDown']) player1.position.addScaledVector(moveForward, -defaultSpeed);
                    if (keys['ArrowLeft']) player1.position.addScaledVector(moveRight, -defaultSpeed);
                    if (keys['ArrowRight']) player1.position.addScaledVector(moveRight, defaultSpeed);
                } else if (isRolling) {
                    rollFrames++; player1.position.addScaledVector(rollDirection, rollSpeed);
                    if (rollFrames >= rollDuration) isRolling = false;
                }

                if (!isGrounded) {
                    p1VelocityY += gravity; player1.position.y += p1VelocityY;
                    if (player1.position.y <= 0) { player1.position.y = 0; p1VelocityY = 0; isGrounded = true; }
                }

                if (isGrabbed) {
                    const targetPos = new THREE.Vector3().copy(player1.position).addScaledVector(moveForward, 1.8); targetPos.y = 0;
                    player2.position.lerp(targetPos, 0.25); if (player2.position.distanceTo(targetPos) < 0.2) isGrabbed = false;
                }

                player1.lookAt(player2.position.x, player1.position.y, player2.position.z);
                player2.lookAt(player1.position.x, player2.position.y, player1.position.z);

                const positions = guideLine.geometry.attributes.position.array;
                positions[0] = p1Center.x; positions[1] = p1Center.y; positions[2] = p1Center.z;
                positions[3] = p2Center.x; positions[4] = p2Center.y; positions[5] = p2Center.z;
                guideLine.geometry.attributes.position.needsUpdate = true;

                // 1인칭 카메라 위치 동기화 및 방향 검증 회전 
                mainCamera.position.copy(p1Center);
                
                if (isRolling) {
                    const progress = rollFrames / rollDuration;
                    const angle = progress * Math.PI * 2;

                    if (rollType === 'forward') {
                        mainCamera.lookAt(p2Center);
                        mainCamera.rotateX(angle);
                    } else if (rollType === 'backward') {
                        mainCamera.lookAt(p2Center);
                        mainCamera.rotateX(-angle);
                    } else {
                        mainCamera.lookAt(p2Center);
                        mainCamera.rotation.z = angle;
                    }
                } else {
                    // [핵심] 억지로 누적된 마이너 오프셋 제거 및 정방향 고정 락온
                    mainCamera.lookAt(p2Center);
                }

                for (let i = projectiles.length - 1; i >= 0; i--) {
                    const p = projectiles[i]; p.life--;
                    if (p.type === 'shockwave') {
                        p.radius += 0.45; p.mesh.geometry.dispose(); p.mesh.geometry = new THREE.RingGeometry(p.radius - 0.6, p.radius, 32); p.mesh.geometry.rotateX(-Math.PI / 2);
                        const dist = player1.position.distanceTo(player2.position);
                        if (dist <= p.radius && dist >= p.radius - 2.5) hitEnemy(p.damage);
                    } else {
                        const currentDir = new THREE.Vector3().subVectors(p2Center, p.mesh.position).normalize();
                        p.mesh.position.addScaledVector(currentDir, p.speed);
                        if (p.mesh.position.distanceTo(p2Center) < 1.8) {
                            hitEnemy(p.damage); if (p.type === 'grab') isGrabbed = true;
                            scene.remove(p.mesh); projectiles.splice(i, 1); continue;
                        }
                    }
                    if (p.life <= 0) { scene.remove(p.mesh); projectiles.splice(i, 1); }
                }
            } else {
                // 인게임 외 로비 루프 제어
                mainCamera.rotation.set(0, 0, 0);
                const time = timestamp * 0.0002;
                mainCamera.position.set(Math.sin(time) * 18, 12, Math.cos(time) * 18); mainCamera.lookAt(0, 1.0, 0);
            }

            renderer.render(scene, mainCamera); subRenderer.render(scene, subCamera);
        }

        window.addEventListener('resize', () => {
            mainCamera.aspect = window.innerWidth / window.innerHeight; mainCamera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        processSelectChar('avenger'); confirmSelection(); changeScene('start'); animate(0);
    </script>
</body>
</html>
