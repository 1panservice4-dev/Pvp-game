<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 대전 게임 - HP/MP 시스템</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        
        /* 메인 UI 스타일 */
        #ui {
            position: absolute; top: 10px; left: 10px; color: white;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px;
            pointer-events: none; z-index: 10;
        }
        h3 { margin: 0 0 10px 0; color: #00ffcc; }
        .controls { font-size: 13px; line-height: 1.5; }

        /* 상태창 UI (상단 배틀 게이지) */
        #status-container {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 40px; background: rgba(0,0,0,0.6);
            padding: 10px 25px; border-radius: 30px; border: 1px solid #444;
            z-index: 10; pointer-events: none; width: 500px; justify-content: space-between;
        }
        .status-box { display: flex; flex-direction: column; width: 220px; }
        .status-box.right { align-items: flex-end; }
        .label { color: #aaa; font-size: 12px; margin-bottom: 3px; font-weight: bold; }
        
        /* 게이지 바 공통 */
        .bar-bg { width: 100%; height: 12px; background: #333; border-radius: 6px; overflow: hidden; margin-bottom: 4px; }
        .bar-fill { height: 100%; width: 100%; transition: width 0.1s ease; }
        .hp-fill { background: #ff3366; }
        .mp-fill { background: #3399ff; }

        #sub-view {
            position: absolute; bottom: 20px; left: 20px;
            width: 250px; height: 180px;
            border: 2px solid #00ffcc; border-radius: 6px;
            box-shadow: 0 0 15px rgba(0,255,204,0.5);
            pointer-events: none; z-index: 5;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="status-container">
        <div class="status-box">
            <div class="label" style="color: #00ff88;">PLAYER (나)</div>
            <div class="bar-bg"><div id="p1-hp" class="bar-fill hp-fill"></div></div>
            <div class="bar-bg" style="height: 8px;"><div id="p1-mp" class="bar-fill mp-fill"></div></div>
        </div>
        <div class="status-box right">
            <div class="label" style="color: #ff3366;">ENEMY (적)</div>
            <div class="bar-bg"><div id="p2-hp" class="bar-fill hp-fill"></div></div>
            <div class="bar-bg" style="height: 8px;"><div id="p2-mp" class="bar-fill mp-fill" style="width:100%"></div></div>
        </div>
    </div>

    <div id="ui">
        <h3>락온 배틀 (HP/MP 구현)</h3>
        <div class="controls">
            <b>[방향키]</b> 적 기준 조작 (↑전진, ↓후진, ←→공전)<br>
            <b>[스킬 - 필요 마나]</b><br>
            - <span style="color: #ff9900;"><b>W: 왕그랩</b></span> (MP 20) / 적 당기기 + 10뎀<br>
            - <span style="color: #ff3333;"><b>A: 대형 단검</b></span> (MP 15) / 15대미지<br>
            - <span style="color: #33ccff;"><b>S: 폭풍 베기</b></span> (MP 30) / 25대미지<br>
            - <span style="color: #cc33ff;"><b>D: 웅장한 충격파</b></span> (MP 25) / 광역 20뎀 + 넉백<br>
            <br>
            <span style="color: #3399ff;">* 마나는 매초 조금씩 자동으로 회복됩니다.</span><br>
            <span style="color: #ffcc00;">* 적의 충격파 범위에 닿으면 내 체력도 깎입니다!</span>
        </div>
    </div>

    <div id="sub-view"></div>

    <script>
        // --- 1. 기본 시스템 세팅 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050515);

        const mainCamera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const subCamera = new THREE.PerspectiveCamera(60, 250 / 180, 0.1, 1000);
        subCamera.position.set(0, 35, 0);
        subCamera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const subRenderer = new THREE.WebGLRenderer({ antialias: true });
        subRenderer.setSize(250, 180);
        document.getElementById('sub-view').appendChild(subRenderer.domElement);

        // 조명
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(10, 30, 10);
        scene.add(dirLight);

        // 바닥 격자
        const grid = new THREE.GridHelper(60, 60, 0x00ffcc, 0x222222);
        grid.position.y = -0.5;
        scene.add(grid);

        // --- 2. 능력치(HP/MP) 데이터 선언 ---
        const p1Stats = { hp: 100, maxHp: 100, mp: 100, maxMp: 100 };
        const p2Stats = { hp: 100, maxHp: 100, mp: 100, maxMp: 100 };

        // 스킬별 마나 소비 및 데이지 설정 테이블
        const SKILL_DATA = {
            grab:      { mpCost: 20, damage: 10 },
            dagger:    { mpCost: 15, damage: 15 },
            slash:     { mpCost: 30, damage: 25 },
            shockwave: { mpCost: 25, damage: 20 }
        };

        // UI 업데이트 함수
        function updateUI() {
            document.getElementById('p1-hp').style.width = `${Math.max(0, p1Stats.hp)}%`;
            document.getElementById('p1-mp').style.width = `${Math.max(0, p1Stats.mp)}%`;
            document.getElementById('p2-hp').style.width = `${Math.max(0, p2Stats.hp)}%`;
            document.getElementById('p2-mp').style.width = `${Math.max(0, p2Stats.mp)}%`;
        }

        // --- 3. 캐릭터 생성 ---
        const player1 = new THREE.Mesh(
            new THREE.SphereGeometry(0.8, 32, 32),
            new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x003311 })
        );
        player1.position.set(-12, 0.5, 0);
        scene.add(player1);

        const player2 = new THREE.Mesh(
            new THREE.BoxGeometry(2.0, 2.0, 2.0),
            new THREE.MeshStandardMaterial({ color: 0xff3366, roughness: 0.2 })
        );
        player2.position.set(12, 1.0, 0);
        scene.add(player2);

        const lineMat = new THREE.LineBasicMaterial({ color: 0x444444 });
        const lineGeo = new THREE.BufferGeometry().setFromPoints([player1.position, player2.position]);
        const guideLine = new THREE.Line(lineGeo, lineMat);
        scene.add(guideLine);

        // --- 4. 입력 관리 ---
        const keys = {};
        const projectiles = []; 
        const playerSpeed = 0.22; 
        let enemyTime = 0;
        let isGrabbed = false; 

        window.addEventListener('keydown', (e) => {
            if(['arrowup','arrowdown','arrowleft','arrowright','w','a','s','d'].includes(e.key.toLowerCase())) {
                e.preventDefault(); 
            }
            const keyStr = e.key.toLowerCase();
            keys[e.key] = true; 
            keys[keyStr] = true; 

            if (keyStr === 'w') useSkill('grab');
            if (keyStr === 'a') useSkill('dagger');
            if (keyStr === 's') useSkill('slash');
            if (keyStr === 'd') useSkill('shockwave');
        });
        
        window.addEventListener('keyup', (e) => { 
            keys[e.key] = false;
            keys[e.key.toLowerCase()] = false;
        });

        // --- 5. 스킬 로직 (MP 검증 로직 탑재) ---
        function useSkill(type) {
            const data = SKILL_DATA[type];
            
            // 내 마나가 소모량보다 적으면 스킬 발사 취소
            if (p1Stats.mp < data.mpCost) {
                console.log("마나가 부족합니다!");
                return; 
            }

            // 마나 차감 및 UI 반영
            p1Stats.mp -= data.mpCost;
            updateUI();

            const toEnemy = new THREE.Vector3().subVectors(player2.position, player1.position).normalize();
            const spawnPos = new THREE.Vector3().copy(player1.position).addScaledVector(toEnemy, 1.5);
            spawnPos.y = 1.0; 

            if (type === 'grab') {
                const grabGeo = new THREE.CylinderGeometry(0.3, 0.3, 6, 16);
                grabGeo.rotateX(Math.PI / 2); 
                const grabMesh = new THREE.Mesh(grabGeo, new THREE.MeshBasicMaterial({ color: 0xff9900 }));
                grabMesh.position.copy(spawnPos);
                scene.add(grabMesh);
                projectiles.push({ type: 'grab', mesh: grabMesh, dir: toEnemy, speed: 0.5, life: 50, damage: data.damage });

            } else if (type === 'dagger') {
                const daggerGeo = new THREE.ConeGeometry(0.5, 2.5, 16);
                daggerGeo.rotateX(Math.PI / 2);
                const daggerMesh = new THREE.Mesh(daggerGeo, new THREE.MeshBasicMaterial({ color: 0xff1111 }));
                daggerMesh.position.copy(spawnPos);
                scene.add(daggerMesh);
                projectiles.push({ type: 'dagger', mesh: daggerMesh, dir: toEnemy, speed: 0.7, life: 60, damage: data.damage });

            } else if (type === 'slash') {
                const slashGeo = new THREE.RingGeometry(1.0, 5.0, 32, 1, 0, Math.PI); 
                slashGeo.rotateX(-Math.PI / 3); 
                const slashMesh = new THREE.Mesh(slashGeo, new THREE.MeshBasicMaterial({ color: 0x00d2ff, side: THREE.DoubleSide }));
                slashMesh.position.copy(spawnPos);
                slashMesh.lookAt(player2.position); 
                scene.add(slashMesh);
                projectiles.push({ type: 'slash', mesh: slashMesh, dir: toEnemy, speed: 0.35, life: 60, damage: data.damage });

            } else if (type === 'shockwave') {
                const waveGeo = new THREE.RingGeometry(0.5, 1.5, 32);
                waveGeo.rotateX(-Math.PI / 2);
                const waveMesh = new THREE.Mesh(waveGeo, new THREE.MeshBasicMaterial({ color: 0xcc33ff, side: THREE.DoubleSide, transparent: true, opacity: 0.9 }));
                waveMesh.position.copy(player1.position);
                waveMesh.position.y = 0.2; 
                scene.add(waveMesh);
                projectiles.push({ type: 'shockwave', mesh: waveMesh, radius: 1.5, life: 35, damage: data.damage });
            }
        }

        // 데미지 프로세스 함수
        function damageEnemy(amount) {
            p2Stats.hp -= amount;
            if (p2Stats.hp < 0) p2Stats.hp = 0;
            updateUI();

            player2.scale.set(1.5, 1.5, 1.5);
            player2.material.color.setHex(0xffffff);
            setTimeout(() => {
                player2.scale.set(1.0, 1.0, 1.0);
                player2.material.color.setHex(0xff3366);
            }, 150);

            // 적 사망 시 부활 리셋 처리
            if (p2Stats.hp <= 0) {
                setTimeout(() => { p2Stats.hp = 100; updateUI(); }, 1500);
            }
        }

        // --- 6. 게임 메인 루프 ---
        let lastRegenTime = 0;

        function animate(timestamp) {
            requestAnimationFrame(animate);

            // 자연 마나 회복 시스템 (0.2초마다 마나 1씩 자동 충전)
            if (timestamp - lastRegenTime > 200) {
                if (p1Stats.mp < p1Stats.maxMp) p1Stats.mp = Math.min(p1Stats.maxMp, p1Stats.mp + 1.5);
                if (p2Stats.mp < p2Stats.maxMp) p2Stats.mp = Math.min(p2Stats.maxMp, p2Stats.mp + 1);
                updateUI();
                lastRegenTime = timestamp;
            }

            // [1] 적 기준 이동 연산
            const forwardVec = new THREE.Vector3().subVectors(player2.position, player1.position);
            const distanceToEnemy = forwardVec.length();
            forwardVec.normalize();
            const rightVec = new THREE.Vector3().crossVectors(forwardVec, new THREE.Vector3(0, 1, 0)).normalize();

            if (keys['ArrowUp'] && distanceToEnemy > 3.0) player1.position.addScaledVector(forwardVec, playerSpeed);
            if (keys['ArrowDown']) player1.position.addScaledVector(forwardVec, -playerSpeed);
            if (keys['ArrowLeft']) player1.position.addScaledVector(rightVec, playerSpeed);
            if (keys['ArrowRight']) player1.position.addScaledVector(rightVec, -playerSpeed);

            // [2] 적 AI 패턴 및 보스 반격 로직
            if (!isGrabbed) {
                enemyTime += 0.015;
                player2.position.z = Math.sin(enemyTime * 1.5) * 8;
                player2.position.x = 12 + Math.cos(enemyTime) * 4;

                // 적의 지능형 반격: 플레이어가 사정거리(5유닛) 이내로 들어오면 보라색 충격파로 맞대응!
                if (distanceToEnemy < 6.0 && Math.random() < 0.01 && p2Stats.mp >= 25) {
                    p2Stats.mp -= 25;
                    const eWaveGeo = new THREE.RingGeometry(0.5, 6.0, 32); // 거대한 적 충격파
                    eWaveGeo.rotateX(-Math.PI / 2);
                    const eWaveMesh = new THREE.Mesh(eWaveGeo, new THREE.MeshBasicMaterial({ color: 0xff3333, side: THREE.DoubleSide, transparent: true, opacity: 0.6 }));
                    eWaveMesh.position.copy(player2.position);
                    eWaveMesh.position.y = 0.2;
                    scene.add(eWaveMesh);
                    
                    // 나에게 가해지는 피격 판정
                    p1Stats.hp -= 20; // 20 대미지 피격
                    if (p1Stats.hp < 0) p1Stats.hp = 0;
                    updateUI();
                    
                    // 맞으면 플레이어도 뒤로 살짝 튕겨나감
                    player1.position.addScaledVector(forwardVec, -1.5);

                    setTimeout(() => scene.remove(eWaveMesh), 300);

                    if (p1Stats.hp <= 0) {
                        setTimeout(() => { p1Stats.hp = 100; p1Stats.mp = 100; updateUI(); }, 1500); // 플레이어 부활
                    }
                }
            } else {
                const targetPos = new THREE.Vector3().copy(player1.position).addScaledVector(forwardVec, 3);
                player2.position.lerp(targetPos, 0.2);
                if (player2.position.distanceTo(targetPos) < 1.5) isGrabbed = false;
            }

            // 가이드라인 동기화
            const positions = guideLine.geometry.attributes.position.array;
            positions[0] = player1.position.x; positions[1] = player1.position.y + 0.5; positions[2] = player1.position.z;
            positions[3] = player2.position.x; positions[4] = player2.position.y; positions[5] = player2.position.z;
            guideLine.geometry.attributes.position.needsUpdate = true;

            // [3] 카메라 고정
            mainCamera.position.copy(player1.position);
            mainCamera.position.y += 1.2; 
            mainCamera.lookAt(player2.position);

            subCamera.position.set(0, 35, 0);
            subCamera.lookAt(0, 0, 0);

            // [4] 스킬 투사체 업데이트 및 대미지 귀속
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.life--;

                if (p.type === 'shockwave') {
                    p.radius += 0.4;
                    p.mesh.geometry.dispose(); 
                    p.mesh.geometry = new THREE.RingGeometry(p.radius - 0.5, p.radius, 32);
                    p.mesh.geometry.rotateX(-Math.PI / 2);
                    p.mesh.material.opacity -= 0.03;

                    const dist = player1.position.distanceTo(player2.position);
                    if (dist <= p.radius && dist >= p.radius - 2.0) {
                        damageEnemy(p.damage);
                        player2.position.addScaledVector(forwardVec, 0.8);
                    }
                } else {
                    const currentDir = new THREE.Vector3().subVectors(player2.position, p.mesh.position).normalize();
                    p.dir.lerp(currentDir, 0.08); 
                    p.mesh.position.addScaledVector(p.dir, p.speed);
                    p.mesh.lookAt(player2.position); 

                    const distance = p.mesh.position.distanceTo(player2.position);
                    if (distance < 2.0) {
                        damageEnemy(p.damage); // 대미지 이전
                        if (p.type === 'grab') isGrabbed = true;
                        scene.remove(p.mesh);
                        projectiles.splice(i, 1);
                        continue;
                    }
                }

                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    projectiles.splice(i, 1);
                }
            }

            player2.rotation.y += 0.02;

            renderer.render(scene, mainCamera);
            subRenderer.render(scene, subCamera);
        }

        window.addEventListener('resize', () => {
            mainCamera.aspect = window.innerWidth / window.innerHeight;
            mainCamera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 초기 바 정렬 실행 및 룹 가동
        updateUI();
        animate(0);
    </script>
</body>
</html>
